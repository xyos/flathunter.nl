name: Frontend

on:
  push:
    branches: ['main']
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

jobs:
  build:
    name: Build + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      # Build needs a DATABASE_URL to be set, but the build itself does not
      # connect — it only imports pg. A dummy value lets the getPool() check
      # in lib/db.ts stay strict while not requiring a real secret in CI.
      - run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?sslmode=disable
